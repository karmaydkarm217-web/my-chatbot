<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
      --accent: #7c6aff; --accent2: #ff6ab0; --text: #e8e8f0;
      --muted: #6b6b80; --user-bg: #1e1b3a; --bot-bg: #13131a;
    }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; top: -40%; left: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; bottom: -30%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(255,106,176,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 780px; height: 100vh; display: flex; flex-direction: column; padding: 24px 16px 16px; }
    header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
    header h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { margin-left: auto; font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 8px 4px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease forwards; opacity: 0; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-family: 'Syne', sans-serif; font-weight: 700; }
    .message.bot .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .message.user .avatar { background: var(--user-bg); border: 1px solid var(--border); color: var(--accent); }
    .bubble { max-width: 72%; padding: 12px 16px; border-radius: 16px; font-size: 0.88rem; line-height: 1.65; border: 1px solid var(--border); }
    .message.bot .bubble { background: var(--bot-bg); border-radius: 4px 16px 16px 16px; }
    .message.user .bubble { background: var(--user-bg); border-color: rgba(124,106,255,0.3); border-radius: 16px 4px 16px 16px; text-align: right; }
    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; background: color-mix(in srgb, var(--accent) 60%, var(--accent2)); }
    .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
    .input-area { margin-top: 16px; display: flex; gap: 10px; align-items: flex-end; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 10px 10px 10px 16px; transition: border-color 0.2s; }
    .input-area:focus-within { border-color: rgba(124,106,255,0.5); }
    #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.88rem; resize: none; max-height: 120px; line-height: 1.6; }
    #user-input::placeholder { color: var(--muted); }
    #send-btn { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn svg { width: 16px; height: 16px; fill: white; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); font-size: 0.82rem; text-align: center; }
    .empty-state .big { font-size: 2.5rem; }
    .empty-state p { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo">🤖</div>
      <h1>my<span>bot</span></h1>
      <div class="status"><div class="status-dot"></div>online</div>
    </header>
    <div id="chat-box">
      <div class="empty-state" id="empty">
        <div class="big">💬</div>
        <p>Start a conversation</p>
        <span>Ask me anything...</span>
      </div>
    </div>
    <div class="input-area">
      <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
  <script>
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");
    input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
    function addMessage(text, role) {
      const empty = document.getElementById("empty");
      if (empty) empty.remove();
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "bot" ? "AI" : "U";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
    function showTyping() {
      const msg = document.createElement("div");
      msg.className = "message bot"; msg.id = "typing";
      const avatar = document.createElement("div");
      avatar.className = "avatar"; avatar.textContent = "AI";
      const bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.innerHTML = "<span></span><span></span><span></span>";
      msg.appendChild(avatar); msg.appendChild(bubble);
      chatBox.appendChild(msg); chatBox.scrollTop = chatBox.scrollHeight;
    }
    function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = ""; input.style.height = "auto";
      showTyping();
      const res = await fetch("/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: text }) });
      const data = await res.json();
      removeTyping();
      addMessage(data.reply, "bot");
    }
  </script>
</body>
</html>
